name: 법률서식 자동 수집

on:
  schedule:
    # 매월 1일 오전 8시 KST (UTC+9 → UTC 23:00 전날)
    - cron: '0 23 1 * *'
  workflow_dispatch:  # 수동 트리거

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      PYTHONUTF8: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: uv 설치
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Python 의존성 설치
        run: uv sync

      - name: Playwright 브라우저 설치
        run: uv run playwright install chromium --with-deps

      - name: 정부부처 계약서 수집
        run: uv run python -u -X utf8 main.py --target gov

      - name: 법률서식 수집 (KLAC·ECFS·EKT)
        run: uv run python -u -X utf8 main.py --target legal
        continue-on-error: true  # 해외 IP 차단으로 실패해도 워크플로우 계속

      - name: 결과 요약 출력
        if: always()
        run: |
          echo "## 수집 결과" >> $GITHUB_STEP_SUMMARY
          echo "Supabase scrape_logs 테이블에서 run_id로 상세 확인 가능" >> $GITHUB_STEP_SUMMARY
